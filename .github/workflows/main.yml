name: Facebook OSINT Scan

on:
  workflow_dispatch:
    inputs:
      facebook_url:
        description: 'Facebook Profile URL to Scan'
        required: true
        default: 'https://www.facebook.com/zuck'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout your repository code (main.py)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Download the library source code as a ZIP file
      - name: Download FBIntelPy source
        run: curl -L -o FBIntelPy.zip https://github.com/Binyamin-Global/FBIntelPy/archive/refs/heads/main.zip

      # 4. Unzip the downloaded file
      - name: Unzip source file
        run: unzip FBIntelPy.zip

      # 5. Install the library from the unzipped directory
      - name: Install dependencies from local source
        run: |
          python -m pip install --upgrade pip
          pip install ./FBIntelPy-main

      # 6. Run the OSINT scan
      - name: Run OSINT Scan
        run: |
          python main.py "${{ github.event.inputs.facebook_url }}"
