name: Facebook OSINT Scan

on:
  workflow_dispatch:
    inputs:
      facebook_url:
        description: 'Facebook Profile URL to Scan'
        required: true
        default: 'https://www.facebook.com/zuck'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout your repository code (main.py)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install social-analyzer and its dependencies
      - name: Install social-analyzer
        run: |
          python -m pip install --upgrade pip
          pip install social-analyzer

      # 4. Run the OSINT scan
      - name: Run OSINT Scan
        run: |
          python main.py "${{ github.event.inputs.facebook_url }}"
