name: Fighter Pro Monitor v3.0

on:
  schedule:
    - cron: '*/2 * * * *'   # كل دقيقتين
  workflow_dispatch:         # تشغيل يدوي من GitHub

concurrency:
  group: fighter-monitor
  cancel-in-progress: true   # يمنع تشغيل نسختين في نفس الوقت

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Init history.csv
        run: |
          if [ ! -f history.csv ]; then
            echo "time,round,multiplier,streak,confidence%,ema,sma,std_dev,win_rate%,signal" > history.csv
          fi

      - name: Run Monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          timeout 85m python main.py || echo "Session ended"

      - name: Save Results
        if: always()
        run: |
          git config user.name  "Fighter Bot"
          git config user.email "bot@fighter.local"
          git add history.csv monitor.log || true
          git diff --staged --quiet || git commit -m "Update history - $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main || true
          git push || true
