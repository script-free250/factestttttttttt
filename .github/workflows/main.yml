name: Fighter Pro Cloud Monitor

on:
  schedule:
    - cron: '*/1 * * * *'     # يشتغل كل دقيقة
  workflow_dispatch:          # يمكن تشغيله يدوياً

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright rich requests
          playwright install chromium --with-deps

      - name: Run Monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit History
        run: |
          git config user.name "Fighter Bot"
          git config user.email "bot@github.com"
          git add history.csv
          git commit -m "Update history - $(date)" || echo "No changes"
          git push
