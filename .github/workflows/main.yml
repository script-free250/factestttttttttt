name: Facebook OSINT Scan

on:
  workflow_dispatch:
    inputs:
      facebook_url:
        description: 'Facebook Profile URL to Scan'
        required: true
        default: 'https://www.facebook.com/du.dzii.9'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Git
        run: sudo apt-get update && sudo apt-get install -y git

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run OSINT Scan
        run: |
          python main.py "${{ github.event.inputs.facebook_url }}"
