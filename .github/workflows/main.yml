# اسم سير العمل (Workflow)
name: Build Python Executable

# متى يتم تشغيل سير العمل
on:
  push:
    branches: [ "main" ] # يعمل عند الدفع إلى الفرع الرئيسي
  pull_request:
    branches: [ "main" ] # يعمل عند طلبات السحب إلى الفرع الرئيسي

jobs:
  build:
    # نظام التشغيل الذي سيعمل عليه
    runs-on: windows-latest

    steps:
    # الخطوة 1: استنساخ الكود من المستودع
    - name: Check out repository code
      uses: actions/checkout@v4

    # الخطوة 2: إعداد بيئة بايثون
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # يمكنك تحديد إصدار بايثون

    # الخطوة 3: تثبيت المكتبات المطلوبة (في حالتنا هذه لا توجد مكتبات خارجية، ولكنها خطوة جيدة)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # pip install -r requirements.txt # قم بإلغاء التعليق إذا كان لديك ملف requirements.txt
        pip install pyinstaller

    # الخطوة 4: بناء الملف التنفيذي (.exe) باستخدام PyInstaller
    - name: Build executable
      run: pyinstaller --onefile --windowed --name CrashAnalyzer analyzer.py
      # --onefile: لإنتاج ملف exe واحد
      # --windowed: لإخفاء نافذة الأوامر السوداء عند التشغيل (استخدم --console إذا أردت رؤيتها)
      # --name: لتحديد اسم الملف التنفيذي الناتج

    # الخطوة 5: رفع الملف التنفيذي كقطعة أثرية (Artifact)
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CrashAnalyzer-Executable # اسم القطعة الأثرية
        path: dist/CrashAnalyzer.exe # المسار إلى الملف التنفيذي الذي تم بناؤه

